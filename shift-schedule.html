<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>برنامه شیفت کاری</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F5F0;
    --bg-elevated:#FFFFFF;
    --ink:#26241E;
    --ink-soft:#6B6558;
    --line:#E7E2D6;
    --accent:#3B3F8C;
    --day:#F2B84B;
    --day-ink:#5C3F0A;
    --evening:#E0703C;
    --evening-ink:#5C2A10;
    --night:#3B3F8C;
    --night-ink:#FFFFFF;
    --off:#6E9C7C;
    --off-ink:#0F2B18;
    --radius:16px;
    --shadow: 0 2px 10px rgba(38,36,30,0.06);
  }
  [data-theme="dark"]{
    --bg:#13141C;
    --bg-elevated:#1C1E29;
    --ink:#EDEBE4;
    --ink-soft:#9A97A8;
    --line:#2B2D3B;
    --accent:#8B90F0;
    --day:#D9A23E;
    --day-ink:#1A1200;
    --evening:#D9713D;
    --evening-ink:#1A0C04;
    --night:#5257C9;
    --night-ink:#F5F5FF;
    --off:#5C9270;
    --off-ink:#EAF7EE;
    --shadow: 0 2px 14px rgba(0,0,0,0.4);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Vazirmatn', Tahoma, sans-serif;
    background:var(--bg);
    color:var(--ink);
    transition:background .25s, color .25s;
    -webkit-tap-highlight-color: transparent;
    padding-bottom: 32px;
  }
  header{
    padding:22px 18px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  header h1{
    font-size:19px;
    margin:0;
    font-weight:800;
    letter-spacing:-0.3px;
  }
  header .sub{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:2px;
    font-weight:500;
  }
  .theme-btn{
    width:42px;height:42px;
    border-radius:50%;
    border:1px solid var(--line);
    background:var(--bg-elevated);
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
    cursor:pointer;
    box-shadow:var(--shadow);
  }
  nav.tabs{
    display:flex;
    gap:6px;
    padding:0 14px 14px;
    overflow-x:auto;
  }
  nav.tabs button{
    flex:0 0 auto;
    padding:9px 14px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--bg-elevated);
    color:var(--ink-soft);
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
  }
  nav.tabs button.active{
    background:var(--accent);
    color:#fff;
    border-color:var(--accent);
  }
  .group-bar{
    display:flex;
    gap:8px;
    padding:0 14px 16px;
    overflow-x:auto;
  }
  .chip{
    flex:0 0 auto;
    padding:8px 16px;
    border-radius:12px;
    border:1.5px solid var(--line);
    background:var(--bg-elevated);
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    color:var(--ink-soft);
  }
  .chip.active{
    border-color:var(--accent);
    color:var(--accent);
    background:color-mix(in srgb, var(--accent) 12%, var(--bg-elevated));
  }
  main{ padding: 0 14px; }
  .card{
    background:var(--bg-elevated);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:18px;
    margin-bottom:16px;
    border:1px solid var(--line);
  }
  .today-big{
    text-align:center;
    padding:6px 0 18px;
  }
  .today-big .date{
    font-size:15px;
    color:var(--ink-soft);
    font-weight:600;
  }
  .today-big .label{
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  .state-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }
  .state-cell{
    border-radius:14px;
    padding:14px 10px;
    text-align:center;
  }
  .state-cell .g{
    font-size:13px;
    font-weight:700;
    opacity:0.85;
  }
  .state-cell .s{
    font-size:15px;
    font-weight:800;
    margin-top:4px;
  }
  .icon-lg{ font-size:22px; display:block; margin-bottom:2px;}
  .shift-day{ background:var(--day); color:var(--day-ink); }
  .shift-evening{ background:var(--evening); color:var(--evening-ink); }
  .shift-night{ background:var(--night); color:var(--night-ink); }
  .shift-off{ background:var(--off); color:var(--off-ink); }

  .date-picker{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  select{
    flex:1;
    padding:10px 8px;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--bg);
    color:var(--ink);
    font-family:inherit;
    font-size:13px;
    font-weight:600;
  }
  .month-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:12px;
  }
  .month-nav button{
    width:36px;height:36px;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--bg);
    color:var(--ink);
    font-size:16px;
    cursor:pointer;
  }
  .month-nav .title{
    font-weight:800;
    font-size:15px;
  }
  .weekday-row{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    text-align:center;
    font-size:11px;
    color:var(--ink-soft);
    font-weight:700;
    margin-bottom:6px;
  }
  .day-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
  }
  .day-cell{
    aspect-ratio:1;
    border-radius:10px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:700;
    position:relative;
  }
  .day-cell.empty{ background:transparent; }
  .day-cell.today{ outline:2px solid var(--accent); outline-offset:1.5px; }
  .day-cell .num{ font-size:13px; }
  .day-cell .ic{ font-size:11px; margin-top:1px; }
  .legend{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:14px;
    font-size:11px;
    color:var(--ink-soft);
  }
  .legend span{
    display:flex;
    align-items:center;
    gap:5px;
  }
  .legend i{
    width:10px;height:10px;border-radius:3px;display:inline-block;
  }
  .year-month{
    margin-bottom:18px;
  }
  .year-month h3{
    font-size:13px;
    margin:0 0 8px;
    font-weight:800;
    color:var(--ink-soft);
  }
  .mini-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:3px;
  }
  .mini-cell{
    aspect-ratio:1;
    border-radius:5px;
    font-size:9px;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;
  }
  .mini-cell.empty{ background:transparent; }
  .footer-note{
    text-align:center;
    color:var(--ink-soft);
    font-size:11px;
    padding:10px 20px 0;
    line-height:1.9;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>برنامه شیفت کاری</h1>
    <div class="sub">چهار گروه • چرخه ۸ روزه • تقویم شمسی</div>
  </div>
  <button class="theme-btn" id="themeBtn" aria-label="حالت شب">🌙</button>
</header>

<nav class="tabs" id="tabs">
  <button data-tab="today" class="active">امروز و فردا</button>
  <button data-tab="custom">تاریخ دلخواه</button>
  <button data-tab="monthly">برنامه ماهانه</button>
  <button data-tab="yearly">برنامه سالانه</button>
</nav>

<main>

  <!-- TODAY / TOMORROW -->
  <section id="tab-today" class="tab-panel">
    <div class="card">
      <div class="today-big">
        <div class="label">امروز</div>
        <div class="date" id="todayDate">—</div>
      </div>
      <div class="state-grid" id="todayGrid"></div>
    </div>
    <div class="card">
      <div class="today-big">
        <div class="label">فردا</div>
        <div class="date" id="tomorrowDate">—</div>
      </div>
      <div class="state-grid" id="tomorrowGrid"></div>
    </div>
  </section>

  <!-- CUSTOM DATE -->
  <section id="tab-custom" class="tab-panel" style="display:none;">
    <div class="card">
      <div class="date-picker">
        <select id="cy"></select>
        <select id="cm"></select>
        <select id="cd"></select>
      </div>
      <div class="today-big" style="padding-top:0;">
        <div class="date" id="customDateLabel">—</div>
      </div>
      <div class="state-grid" id="customGrid"></div>
    </div>
  </section>

  <!-- MONTHLY -->
  <section id="tab-monthly" class="tab-panel" style="display:none;">
    <div class="group-bar" id="groupBarMonthly"></div>
    <div class="card">
      <div class="month-nav">
        <button id="prevMonth">▶</button>
        <div class="title" id="monthTitle">—</div>
        <button id="nextMonth">◀</button>
      </div>
      <div class="weekday-row">
        <div>ش</div><div>ی</div><div>د</div><div>س</div><div>چ</div><div>پ</div><div>ج</div>
      </div>
      <div class="day-grid" id="monthGrid"></div>
      <div class="legend" id="legendMonthly"></div>
    </div>
  </section>

  <!-- YEARLY -->
  <section id="tab-yearly" class="tab-panel" style="display:none;">
    <div class="group-bar" id="groupBarYearly"></div>
    <div class="card">
      <div class="month-nav">
        <button id="prevYear">▶</button>
        <div class="title" id="yearTitle">—</div>
        <button id="nextYear">◀</button>
      </div>
      <div id="yearContainer"></div>
      <div class="legend" id="legendYearly"></div>
    </div>
  </section>

</main>

<div class="footer-note">
  مبنای محاسبه: ۱۵ تیر ۱۴۰۵ — گروه A شب‌کار، گروه B استراحت، گروه C روزکار، گروه D عصرکار<br>
  تمام محاسبات به‌صورت آفلاین و روی همین دستگاه انجام می‌شود
</div>

<script>
/* ============ Jalali <-> Gregorian conversion (standard calendrical algorithm) ============ */
function div(a,b){ return Math.floor(a/b); }
function mod(a,b){ return a - b*Math.floor(a/b); }

var jBreaks = [-61,9,38,199,426,686,756,818,1111,1181,1210,1635,2060,2097,2192,2262,2324,2394,2456,3178];

function jalCal(jy){
  var bl = jBreaks.length, jp = jBreaks[0], jm, jump=0, leap, n, i;
  var gy = jy + 621, leapJ = -14, leapG = -5;
  for(i=1;i<bl;i++){
    jm = jBreaks[i];
    jump = jm - jp;
    if(jy < jm) break;
    leapJ = leapJ + div(jump,33)*8 + div(mod(jump,33),4);
    jp = jm;
  }
  n = jy - jp;
  leapJ = leapJ + div(n,33)*8 + div(mod(n,33)+3,4);
  if(mod(jump,33)===4 && jump-n===4) leapJ += 1;
  leapG = div(gy,4) - div((div(gy,100)+1)*3,4) - 150;
  var march = 20 + leapJ - leapG;
  if(jump - n < 6) n = n - jump + div(jump,33)*33;
  leap = mod(mod(n+1,33)-1,4);
  if(leap === -1) leap = 4;
  return { leap: leap, gy: gy, march: march };
}

function g2d(Y,M,D){
  var a = div(14-M,12);
  var y = Y + 4800 - a;
  var m = M + 12*a - 3;
  return D + div(153*m+2,5) + 365*y + div(y,4) - div(y,100) + div(y,400) - 32045;
}
function d2g(jdn){
  var a = jdn + 32044;
  var b = div(4*a+3,146097);
  var c = a - div(146097*b,4);
  var d = div(4*c+3,1461);
  var e = c - div(1461*d,4);
  var m = div(5*e+2,153);
  var D = e - div(153*m+2,5) + 1;
  var M = m + 3 - 12*div(m,10);
  var Y = 100*b + d - 4800 + div(m,10);
  return {gy:Y, gm:M, gd:D};
}
function j2d(jy,jm,jd){
  var r = jalCal(jy);
  return g2d(r.gy,3,r.march) + (jm-1)*31 - div(jm,7)*(jm-7) + jd - 1;
}
function d2j(jdn){
  var gy = d2g(jdn).gy, jy = gy - 621, r, jdn1f, k, jm, jd;
  r = jalCal(jy);
  jdn1f = g2d(gy,3,r.march);
  k = jdn - jdn1f;
  if(k >= 0){
    if(k <= 185){
      jm = 1 + div(k,31);
      jd = mod(k,31) + 1;
      return {jy:jy, jm:jm, jd:jd};
    } else {
      k -= 186;
    }
  } else {
    jy -= 1;
    k += 179;
    if(r.leap === 1) k += 1;
  }
  jm = 7 + div(k,30);
  jd = mod(k,30) + 1;
  return {jy:jy, jm:jm, jd:jd};
}
function jMonthLength(jy,jm){
  var jy2 = jm===12 ? jy+1 : jy;
  var jm2 = jm===12 ? 1 : jm+1;
  return j2d(jy2,jm2,1) - j2d(jy,jm,1);
}

/* ============ Shift logic ============ */
var MONTH_NAMES = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
var GROUPS = ['A','B','C','D'];
var OFFSET = { A:4, B:6, C:0, D:2 };
var MASTER = ['روزکار','روزکار','عصرکار','عصرکار','شبکار','شبکار','استراحت','استراحت'];
var SHIFT_META = {
  'روزکار':   { cls:'shift-day',     icon:'☀️' },
  'عصرکار':   { cls:'shift-evening', icon:'🌇' },
  'شبکار':    { cls:'shift-night',   icon:'🌙' },
  'استراحت':  { cls:'shift-off',     icon:'💤' }
};
var REF_JDN = j2d(1405,4,15); // مبنای محاسبه

function shiftsForJdn(jdn){
  var diff = jdn - REF_JDN;
  var idx = ((diff % 8) + 8) % 8;
  var out = {};
  GROUPS.forEach(function(g){
    out[g] = MASTER[(idx + OFFSET[g]) % 8];
  });
  return out;
}
function shiftForGroupJdn(jdn, group){
  var diff = jdn - REF_JDN;
  var idx = ((diff % 8) + 8) % 8;
  return MASTER[(idx + OFFSET[group]) % 8];
}
function todayJdn(){
  var t = new Date();
  return g2d(t.getFullYear(), t.getMonth()+1, t.getDate());
}
function weekdayColOfJdn(jdn){
  var g = d2g(jdn);
  var dow = new Date(g.gy, g.gm-1, g.gd).getDay(); // 0=Sun..6=Sat
  return (dow + 1) % 7; // 0=Sat ... 6=Fri
}
function fmtJalali(j){
  return j.jd + ' ' + MONTH_NAMES[j.jm-1] + ' ' + j.jy;
}

/* ============ Rendering helpers ============ */
function renderStateGrid(container, jdn){
  var states = shiftsForJdn(jdn);
  container.innerHTML = '';
  GROUPS.forEach(function(g){
    var meta = SHIFT_META[states[g]];
    var div = document.createElement('div');
    div.className = 'state-cell ' + meta.cls;
    div.innerHTML = '<span class="icon-lg">'+meta.icon+'</span><div class="g">گروه '+g+'</div><div class="s">'+states[g]+'</div>';
    container.appendChild(div);
  });
}
function legendHtml(){
  return Object.keys(SHIFT_META).map(function(k){
    var cls = SHIFT_META[k].cls;
    var colorVar = cls==='shift-day'?'--day':cls==='shift-evening'?'--evening':cls==='shift-night'?'--night':'--off';
    return '<span><i style="background:var('+colorVar+')"></i>'+SHIFT_META[k].icon+' '+k+'</span>';
  }).join('');
}

/* ============ Tabs ============ */
var tabButtons = document.querySelectorAll('#tabs button');
tabButtons.forEach(function(btn){
  btn.addEventListener('click', function(){
    tabButtons.forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(function(p){ p.style.display='none'; });
    document.getElementById('tab-'+btn.dataset.tab).style.display='block';
  });
});

/* ============ Theme ============ */
var themeBtn = document.getElementById('themeBtn');
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  themeBtn.textContent = t==='dark' ? '☀️' : '🌙';
}
var savedTheme = 'light';
try{ savedTheme = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark':'light'; }catch(e){}
applyTheme(savedTheme);
themeBtn.addEventListener('click', function(){
  var cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur==='dark' ? 'light' : 'dark');
});

/* ============ Today / Tomorrow ============ */
var tJdn = todayJdn();
document.getElementById('todayDate').textContent = fmtJalali(d2j(tJdn));
document.getElementById('tomorrowDate').textContent = fmtJalali(d2j(tJdn+1));
renderStateGrid(document.getElementById('todayGrid'), tJdn);
renderStateGrid(document.getElementById('tomorrowGrid'), tJdn+1);

/* ============ Custom date ============ */
var cy = document.getElementById('cy'), cm = document.getElementById('cm'), cd = document.getElementById('cd');
var todayJ = d2j(tJdn);
for(var y=todayJ.jy-3; y<=todayJ.jy+3; y++){
  var opt = document.createElement('option'); opt.value=y; opt.textContent=y;
  if(y===todayJ.jy) opt.selected=true;
  cy.appendChild(opt);
}
MONTH_NAMES.forEach(function(name, i){
  var opt = document.createElement('option'); opt.value=i+1; opt.textContent=name;
  if(i+1===todayJ.jm) opt.selected=true;
  cm.appendChild(opt);
});
function populateDays(){
  var y = parseInt(cy.value), m = parseInt(cm.value);
  var len = jMonthLength(y,m);
  var curVal = parseInt(cd.value) || todayJ.jd;
  cd.innerHTML = '';
  for(var d=1; d<=len; d++){
    var opt = document.createElement('option'); opt.value=d; opt.textContent=d;
    if(d===curVal) opt.selected=true;
    cd.appendChild(opt);
  }
  if(curVal > len){ cd.value = len; }
}
populateDays();
function updateCustom(){
  var y=parseInt(cy.value), m=parseInt(cm.value), d=parseInt(cd.value);
  var jdn = j2d(y,m,d);
  document.getElementById('customDateLabel').textContent = fmtJalali({jy:y,jm:m,jd:d});
  renderStateGrid(document.getElementById('customGrid'), jdn);
}
[cy,cm].forEach(function(el){ el.addEventListener('change', function(){ populateDays(); updateCustom(); }); });
cd.addEventListener('change', updateCustom);
updateCustom();

/* ============ Group bars (monthly & yearly) ============ */
var selectedGroupMonthly = 'A';
var selectedGroupYearly = 'A';
function buildGroupBar(container, getSel, setSel, onChange){
  container.innerHTML = '';
  GROUPS.forEach(function(g){
    var chip = document.createElement('div');
    chip.className = 'chip' + (getSel()===g ? ' active':'');
    chip.textContent = 'گروه ' + g;
    chip.addEventListener('click', function(){
      setSel(g);
      Array.from(container.children).forEach(function(c){ c.classList.remove('active'); });
      chip.classList.add('active');
      onChange();
    });
    container.appendChild(chip);
  });
}
buildGroupBar(document.getElementById('groupBarMonthly'), function(){return selectedGroupMonthly;}, function(g){selectedGroupMonthly=g;}, function(){ renderMonth(); });
buildGroupBar(document.getElementById('groupBarYearly'), function(){return selectedGroupYearly;}, function(g){selectedGroupYearly=g;}, function(){ renderYear(); });

/* ============ Monthly view ============ */
var viewJy = todayJ.jy, viewJm = todayJ.jm;
document.getElementById('legendMonthly').innerHTML = legendHtml();
function renderMonth(){
  document.getElementById('monthTitle').textContent = MONTH_NAMES[viewJm-1] + ' ' + viewJy;
  var grid = document.getElementById('monthGrid');
  grid.innerHTML = '';
  var firstJdn = j2d(viewJy, viewJm, 1);
  var startCol = weekdayColOfJdn(firstJdn);
  var len = jMonthLength(viewJy, viewJm);
  for(var i=0;i<startCol;i++){
    var e = document.createElement('div'); e.className='day-cell empty'; grid.appendChild(e);
  }
  for(var d=1; d<=len; d++){
    var jdn = firstJdn + d - 1;
    var shift = shiftForGroupJdn(jdn, selectedGroupMonthly);
    var meta = SHIFT_META[shift];
    var cell = document.createElement('div');
    cell.className = 'day-cell ' + meta.cls + (jdn===tJdn ? ' today':'');
    cell.innerHTML = '<span class="num">'+d+'</span><span class="ic">'+meta.icon+'</span>';
    grid.appendChild(cell);
  }
}
document.getElementById('prevMonth').addEventListener('click', function(){
  viewJm--; if(viewJm<1){ viewJm=12; viewJy--; }
  renderMonth();
});
document.getElementById('nextMonth').addEventListener('click', function(){
  viewJm++; if(viewJm>12){ viewJm=1; viewJy++; }
  renderMonth();
});
renderMonth();

/* ============ Yearly view ============ */
var viewJyYear = todayJ.jy;
document.getElementById('legendYearly').innerHTML = legendHtml();
function renderYear(){
  document.getElementById('yearTitle').textContent = viewJyYear;
  var container = document.getElementById('yearContainer');
  container.innerHTML = '';
  for(var m=1; m<=12; m++){
    var wrap = document.createElement('div');
    wrap.className = 'year-month';
    var h = document.createElement('h3');
    h.textContent = MONTH_NAMES[m-1];
    wrap.appendChild(h);
    var mg = document.createElement('div');
    mg.className = 'mini-grid';
    var firstJdn = j2d(viewJyYear, m, 1);
    var startCol = weekdayColOfJdn(firstJdn);
    var len = jMonthLength(viewJyYear, m);
    for(var i=0;i<startCol;i++){
      var e = document.createElement('div'); e.className='mini-cell empty'; mg.appendChild(e);
    }
    for(var d=1; d<=len; d++){
      var jdn = firstJdn + d - 1;
      var shift = shiftForGroupJdn(jdn, selectedGroupYearly);
      var meta = SHIFT_META[shift];
      var cell = document.createElement('div');
      cell.className = 'mini-cell ' + meta.cls;
      cell.textContent = d;
      if(jdn===tJdn){ cell.style.outline = '1.5px solid var(--accent)'; }
      mg.appendChild(cell);
    }
    wrap.appendChild(mg);
    container.appendChild(wrap);
  }
}
document.getElementById('prevYear').addEventListener('click', function(){ viewJyYear--; renderYear(); });
document.getElementById('nextYear').addEventListener('click', function(){ viewJyYear++; renderYear(); });
renderYear();
</script>
</body>
</html>
